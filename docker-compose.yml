x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: mlops-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgresql-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    DATA_DB_CONN: postgresql+psycopg2://mlops:mlops123@postgresql-data/mlops_db
    DATA_API_URL: http://host.docker.internal:80
    GROUP_NUMBER: '8'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgresql-airflow:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # ─── PostgreSQL para Airflow metadata ───────────────────────────────────────
  postgresql-airflow:
    image: postgresql:15
    container_name: postgresql-airflow
    environment:
      POSTGRESQL_USER: airflow
      POSTGRESQL_PASSWORD: airflow
      POSTGRESQL_DB: airflow
    volumes:
      - postgresql_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - mlops-network

  # ─── PostgreSQL para datos MLOps (raw, processed, ready) ───────────────────
  postgresql-data:
    image: postgresql:15
    container_name: postgresql-data
    environment:
      POSTGRESQL_USER: mlops
      POSTGRESQL_PASSWORD: mlops123
      POSTGRESQL_DB: mlops_db
    volumes:
      - postgresql_data_volume:/var/lib/postgresql/data
      - ./postgresql/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlops", "-d", "mlops_db"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - mlops-network

# ─── Airflow Init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    restart: "no"
    command: ["db", "init"]
    networks:
      - mlops-network

  # ─── Airflow Create User ─────────────────────────────────────────────────────
  airflow-create-user:
    <<: *airflow-common
    container_name: airflow-create-user
    restart: "no"
    command:
      - users
      - create
      - --username
      - admin
      - --firstname
      - Admin
      - --lastname
      - User
      - --role
      - Admin
      - --email
      - admin@example.com
      - --password
      - admin
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgresql-airflow:
        condition: service_healthy
    networks:
      - mlops-network

  # ─── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: ["webserver"]
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-create-user:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy
    networks:
      - mlops-network

  # ─── Airflow Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: ["scheduler"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-create-user:
        condition: service_completed_successfully
      postgresql-airflow:
        condition: service_healthy
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge

volumes:
  postgresql_airflow_data:
  postgresql_data_volume: