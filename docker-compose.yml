x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  image: mlops-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgresql-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    DATA_DB_CONN: postgresql+psycopg2://mlops:mlops123@postgresql-data/mlops_db
    DATA_API_URL: http://host.docker.internal:80
    GROUP_NUMBER: '8'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgresql-airflow:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # ─── PostgreSQL para Airflow metadata ───────────────────────────────────────
  postgresql-airflow:
    image: postgres:15
    container_name: postgresql-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgresql_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - mlops-network

  # ─── PostgreSQL para datos MLOps (raw, processed, ready) ───────────────────
  postgresql-data:
    image: postgres:15
    container_name: postgresql-data
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
      POSTGRES_DB: mlops_db
    volumes:
      - postgresql_data_volume:/var/lib/postgresql/data
      - ./postgresql/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlops", "-d", "mlops_db"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - mlops-network

# ─── Airflow Init ───────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    restart: "no"
    command: ["db", "init"]
    networks:
      - mlops-network

  # ─── Airflow Create User ─────────────────────────────────────────────────────
  airflow-create-user:
    <<: *airflow-common
    container_name: airflow-create-user
    restart: "no"
    command:
      - users
      - create
      - --username
      - admin
      - --firstname
      - Admin
      - --lastname
      - User
      - --role
      - Admin
      - --email
      - admin@example.com
      - --password
      - admin
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgresql-airflow:
        condition: service_healthy
    networks:
      - mlops-network

  # ─── Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: ["webserver"]
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-create-user:
        condition: service_completed_successfully
      postgresql-airflow:
        condition: service_healthy
    networks:
      - mlops-network

  # ─── Airflow Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: ["scheduler"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-create-user:
        condition: service_completed_successfully
      postgresql-airflow:
        condition: service_healthy
    networks:
      - mlops-network

  # ─── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: mlops_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mlops-network
  
  # ─── MinIO setup (crea bucket inicial) ──────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/models --ignore-existing;
      mc mb myminio/data --ignore-existing;
      echo 'Buckets created successfully';
      "
    networks:
      - mlops-network

  # ─── API (FastAPI) ─────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: models
      DATA_DB_CONN: postgresql+psycopg2://mlops:mlops123@postgresql-data/mlops_db
    depends_on:
      minio:
        condition: service_healthy
      postgresql-data:
        condition: service_healthy
    networks:
      - mlops-network

  # ─── Jupyter Notebook ────────────────────────────────────────────────────────
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: 'yes'
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    volumes:
      - ./jupyter:/home/jovyan/work
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge

volumes:
  postgresql_airflow_data:
  postgresql_data_volume:
  minio_data: